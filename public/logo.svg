<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Mocka Cafe">
  <rect width="64" height="64" rx="14" fill="#1a1a1a"/>
  <!-- glass bowl -->
  <path d="M15 17 H49 L33.6 35.6 a2 2 0 0 1-3.2 0 Z" fill="#e08a2b"/>
  <!-- drink surface highlight -->
  <path d="M19 20.2 H45 L43 22.8 H21 Z" fill="#ffce8a"/>
  <!-- rim -->
  <rect x="13.5" y="15.2" width="37" height="3.2" rx="1.6" fill="#e08a2b"/>
  <!-- stem -->
  <rect x="30.4" y="34.5" width="3.2" height="15" rx="1" fill="#e08a2b"/>
  <!-- foot -->
  <rect x="22" y="49" width="20" height="3.4" rx="1.7" fill="#e08a2b"/>
  <!-- straw -->
  <path d="M35 27 L45.5 10.5" fill="none" stroke="#ffce8a" stroke-width="2.6" stroke-linecap="round"/>
  <!-- citrus garnish on the rim -->
  <circle cx="44.5" cy="15.2" r="4.7" fill="#ffce8a" stroke="#e08a2b" stroke-width="1.4"/>
  <path d="M44.5 11 V19.4 M40.3 15.2 H48.7" stroke="#e08a2b" stroke-width="1" opacity="0.85"/>
  <!-- fizz bubbles -->
  <circle cx="25.5" cy="23.5" r="1.3" fill="#ffce8a"/>
  <circle cx="30" cy="26.5" r="1.05" fill="#ffce8a"/>
</svg>
